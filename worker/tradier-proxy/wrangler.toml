name = "tradier-proxy"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Origins allowed to call this worker. Update if your scanner is hosted elsewhere.
# CORS allowlist is browser-only — the worker also enforces a path allowlist
# and per-IP rate limit so non-browser callers (curl etc.) can't abuse it.
[vars]
ALLOWED_ORIGINS = "https://alexreed122287.github.io,http://localhost:8000,http://localhost:8765"

# Cross-device settings sync — KV namespace stores client-side-encrypted
# config blobs. Worker NEVER sees plaintext. Setup (one-time):
#
#   1. Create the namespace:
#        npx wrangler kv namespace create SYNC_CONFIG
#      The command prints an `id = "..."` line — copy it into the binding
#      below (replace 168aef8dca8444cfbc96d989d09b5cca).
#
#   2. Deploy the worker:
#        npx wrangler deploy
#
# To list / inspect: `npx wrangler kv key list --binding SYNC_CONFIG`
[[kv_namespaces]]
binding = "SYNC_CONFIG"
id = "168aef8dca8444cfbc96d989d09b5cca"

# Secrets are set via:
#   npx wrangler secret put TRADIER_LIVE_TOKEN       (your production key)
#   npx wrangler secret put TRADIER_SANDBOX_TOKEN    (optional — falls back to live if missing)
#   npx wrangler secret put LIVE_MODE_TOKEN          (X-Live-Token gate value)
#   npx wrangler secret put WRITE_AUTH_TOKEN         (X-Trade-Token gate value)
# DO NOT put tokens in this file.
